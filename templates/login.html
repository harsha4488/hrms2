<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
  font-family:sans-serif;
}
.card{
  background:white;
  padding:30px;
  border-radius:10px;
  width:300px;
}
input, button{
  width:100%;
  padding:10px;
  margin:8px 0;
}
button{
  background:#667eea;
  color:white;
  border:none;
}
a{
  display:block;
  text-align:center;
}
</style>
</head>

<body>
<div class="card">
<h2>Login</h2>

<form method="post" action="/login">
<input name="email" placeholder="Email">
<input name="password" type="password" placeholder="Password">
<button>Login</button>
</form>

<a href="/register">Register</a>
</div>
</body>
</html>
