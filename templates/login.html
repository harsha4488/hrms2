<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
}
.card{
  background:white;
  padding:40px;
  border-radius:10px;
  width:300px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
input, button{
  width:100%;
  padding:10px;
  margin:10px 0;
}
button{
  background:#667eea;
  color:white;
  border:none;
}
a{
  display:block;
  text-align:center;
}
</style>
</head>

<body>
<div class="card">
<h2>HRMS Login</h2>
<form method="post" action="/login">
<input name="email" placeholder="Email">
<input type="password" name="password" placeholder="Password">
<button>Login</button>
</form>
<a href="/register">Register</a>
</div>
</body>
</html>
