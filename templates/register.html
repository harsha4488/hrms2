<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<style>
body{
  font-family:sans-serif;
  background:#f5f7fb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
.card{
  background:white;
  padding:30px;
  border-radius:10px;
}
input, select, button{
  width:100%;
  padding:10px;
  margin:8px 0;
}
</style>
</head>

<body>
<div class="card">
<h2>Register</h2>

<form method="post" action="/register">
<input name="email" placeholder="Email">
<input name="password" placeholder="Password">
<input name="phone" placeholder="Phone (919876543210)">

<select name="role">
<option value="admin">Admin</option>
<option value="employee">Employee</option>
</select>

<button>Register</button>
</form>
</div>
</body>
</html>
